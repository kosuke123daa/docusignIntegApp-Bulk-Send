<template>
    <lightning-card title="DocuSign 署名依頼" icon-name="doctype:pdf">
        
        <!-- エラーメッセージ表示 -->
        <template if:true={errorMessage}>
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <span class="slds-assistive-text">エラー</span>
                    <span class="slds-icon_container slds-icon-utility-error slds-m-right_x-small">
                        <lightning-icon icon-name="utility:error" alternative-text="error" size="x-small" variant="inverse"></lightning-icon>
                    </span>
                    <h2>{errorMessage}</h2>
                </div>
            </div>
        </template>

        <!-- 成功メッセージ表示 -->
        <template if:true={successMessage}>
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_alert slds-alert_success" role="alert">
                    <span class="slds-assistive-text">成功</span>
                    <span class="slds-icon_container slds-icon-utility-success slds-m-right_x-small">
                        <lightning-icon icon-name="utility:success" alternative-text="success" size="x-small" variant="inverse"></lightning-icon>
                    </span>
                    <h2>{successMessage}</h2>
                </div>
            </div>
        </template>

        <!-- PDFファイルが見つからない場合 -->
        <template if:false={hasPDFFiles}>
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_alert slds-alert_warning" role="alert">
                    <span class="slds-assistive-text">警告</span>
                    <span class="slds-icon_container slds-icon-utility-warning slds-m-right_x-small">
                        <lightning-icon icon-name="utility:warning" alternative-text="warning" size="x-small"></lightning-icon>
                    </span>
                    <h2>この商談にPDFファイルが添付されていません。</h2>
                    <p class="slds-m-top_small">ファイルタブからPDFファイルをアップロードしてください。</p>
                </div>
            </div>
        </template>

        <!-- メインフォーム -->
        <template if:true={hasPDFFiles}>
            <div class="slds-p-around_medium">
                
                <!-- PDFファイル選択 -->
                <div class="slds-form-element">
                    <lightning-combobox
                        label="送信するPDFファイルを選択"
                        value={selectedDocumentId}
                        options={fileOptions}
                        onchange={handleFileChange}
                        placeholder="PDFファイルを選択してください"
                        required
                        disabled={isLoading}
                    ></lightning-combobox>
                </div>

                <!-- 受信者情報入力 -->
                <div class="slds-grid slds-gutters slds-m-top_medium">
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-input
                            label="受信者名"
                            value={recipientName}
                            onchange={handleNameChange}
                            placeholder="山田 太郎"
                            required
                            disabled={isLoading}
                        ></lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-input
                            type="email"
                            label="受信者メールアドレス"
                            value={recipientEmail}
                            onchange={handleEmailChange}
                            placeholder="example@example.com"
                            required
                            disabled={isLoading}
                        ></lightning-input>
                    </div>
                </div>

                <!-- 送信ボタン -->
                <div class="slds-m-top_large">
                    <lightning-button
                        variant="brand"
                        label="DocuSignで送信"
                        icon-name="utility:email"
                        onclick={handleSendEnvelope}
                        disabled={isButtonDisabled}
                        class="slds-m-right_small"
                    ></lightning-button>
                    
                    <lightning-button
                        label="キャンセル"
                        onclick={handleCancel}
                        disabled={isLoading}
                    ></lightning-button>
                </div>

            </div>
        </template>

        <!-- ローディングスピナー -->
        <template if:true={isLoading}>
            <div class="slds-is-relative slds-m-around_medium">
                <lightning-spinner
                    alternative-text="送信中..."
                    size="medium"
                ></lightning-spinner>
            </div>
        </template>

    </lightning-card>
</template>
