<template>
    <lightning-card title="DocuSign Navigator 文書検索" icon-name="standard:document">

        <!-- Search Form -->
        <div class="slds-p-around_medium">
            <div class="slds-grid slds-wrap slds-gutters">

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        label="取引先名"
                        value={partyName}
                        placeholder="例: 虎ノ門株式会社"
                        onchange={handleInputChange}
                        data-field="partyName">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-combobox
                        label="ステータス"
                        value={status}
                        options={statusOptions}
                        onchange={handleInputChange}
                        data-field="status">
                    </lightning-combobox>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        label="文書種別"
                        value={documentType}
                        placeholder="例: Non-disclosure Agreement"
                        onchange={handleInputChange}
                        data-field="documentType">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        label="ファイル名"
                        value={fileName}
                        placeholder="ファイル名で絞り込む"
                        onchange={handleInputChange}
                        data-field="fileName">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        label="カテゴリ"
                        value={category}
                        placeholder="例: BusinessServices"
                        onchange={handleInputChange}
                        data-field="category">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        label="審査状況"
                        value={reviewStatus}
                        placeholder="例: PENDING"
                        onchange={handleInputChange}
                        data-field="reviewStatus">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        label="取込元"
                        value={sourceName}
                        placeholder="例: UploadCenter"
                        onchange={handleInputChange}
                        data-field="sourceName">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        label="言語"
                        value={language}
                        placeholder="例: ja"
                        onchange={handleInputChange}
                        data-field="language">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        type="date"
                        label="満了日（開始）"
                        value={expirationDateFrom}
                        onchange={handleInputChange}
                        data-field="expirationDateFrom">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        type="date"
                        label="満了日（終了）"
                        value={expirationDateTo}
                        onchange={handleInputChange}
                        data-field="expirationDateTo">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        type="date"
                        label="有効日（開始）"
                        value={effectiveDateFrom}
                        onchange={handleInputChange}
                        data-field="effectiveDateFrom">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        type="date"
                        label="有効日（終了）"
                        value={effectiveDateTo}
                        onchange={handleInputChange}
                        data-field="effectiveDateTo">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        type="number"
                        label="最大件数"
                        value={maxResults}
                        min="1"
                        max="100"
                        onchange={handleInputChange}
                        data-field="maxResults">
                    </lightning-input>
                </div>

            </div>

            <div class="slds-m-top_medium">
                <lightning-button
                    variant="brand"
                    label="検索"
                    onclick={handleSearch}
                    disabled={isLoading}>
                </lightning-button>
                <lightning-button
                    variant="neutral"
                    label="クリア"
                    onclick={handleClear}
                    class="slds-m-left_small"
                    disabled={isLoading}>
                </lightning-button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <template lwc:if={isLoading}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <lightning-spinner alternative-text="読み込み中" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Error Message -->
        <template lwc:if={errorMessage}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <span class="slds-assistive-text">エラー</span>
                    <span>{errorMessage}</span>
                </div>
            </div>
        </template>

        <!-- Results Table -->
        <template lwc:if={hasResults}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <p class="slds-text-body_small slds-m-bottom_small">{resultSummary}</p>
                <lightning-datatable
                    data={tableRows}
                    columns={columns}
                    key-field="id"
                    hide-checkbox-column>
                </lightning-datatable>
            </div>
        </template>

        <!-- No Results -->
        <template lwc:if={showNoResults}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <p class="slds-text-body_regular slds-text-color_weak">条件に一致する文書は見つかりませんでした。</p>
            </div>
        </template>

    </lightning-card>

</template>
