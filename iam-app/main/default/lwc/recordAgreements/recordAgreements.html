<template>
    <lightning-card title="Agreement Manager 文書" icon-name="standard:contract">
        <lightning-button
            slot="actions"
            label="更新"
            icon-name="utility:refresh"
            onclick={handleRefresh}
            disabled={isLoading}>
        </lightning-button>

        <div class="slds-var-p-horizontal_medium slds-var-p-bottom_medium">
            <!-- アップロード -->
            <div class="slds-box slds-box_xx-small slds-var-m-bottom_small">
                <lightning-input
                    data-id="fileInput"
                    type="file"
                    label="文書をアップロード（このレコードに紐付け）"
                    accept=".pdf"
                    onchange={handleFileChange}>
                </lightning-input>
                <div class="slds-var-m-top_x-small">
                    <lightning-button
                        variant="brand"
                        label="アップロード"
                        icon-name="utility:upload"
                        onclick={handleUpload}
                        disabled={isUploadDisabled}>
                    </lightning-button>
                    <template if:true={isUploading}>
                        <lightning-spinner alternative-text="アップロード中" size="small"></lightning-spinner>
                    </template>
                </div>
                <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_x-small">
                    PDF・最大5MB。アップロード後、AI抽出が完了すると下の一覧に表示されます。
                </p>
            </div>

            <!-- エラー -->
            <template if:true={errorMessage}>
                <div class="slds-text-color_error slds-var-m-bottom_small" role="alert">
                    {errorMessage}
                </div>
            </template>

            <!-- ローディング -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="読み込み中" size="small"></lightning-spinner>
            </template>

            <!-- 一覧 -->
            <template if:true={hasRows}>
                <lightning-datatable
                    key-field="id"
                    data={rows}
                    columns={columns}
                    hide-checkbox-column
                    column-widths-mode="auto">
                </lightning-datatable>
            </template>

            <!-- 空表示 -->
            <template if:true={showEmpty}>
                <div class="slds-text-align_center slds-text-color_weak slds-var-p-vertical_medium">
                    このレコードに紐づく文書はまだありません。
                </div>
            </template>
        </div>
    </lightning-card>
</template>
